{% extends "layout.html" %}

{% block title %}
    Deactivate Account
{% endblock %}

{% block content %}
    <H3><strong>WARNING!</strong> This action is permanant and <strong>cannot</strong> be undone.</H3>
    <H4>Note: If you own any shares, you cannot deactivate your account.</H4>
    <form action="/deactivate-account" method="post">
        <div>
            <input class="form-control mx-auto w-auto" name="password" placeholder="Password" type="password">
        </div>
        <button class="btn btn-primary" type="submit">Proceed to Deactivation</button>
    </form>
{% endblock %}
