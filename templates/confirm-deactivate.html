{% extends "layout.html" %}

{% block title %}
    Confirm Deactivation
{% endblock %}

{% block content %}
    <H1><strong>Are you sure?</H1>
    <H2><strong>WARNING!</strong> This action is permanant and <strong>cannot</strong> be undone.</H2>
    <form action="/confirm_deactivate" method="post">
        <div>
            <input class="form-control mx-auto w-auto" name="password" placeholder="Password" type="password">
        </div>
        <button class="btn btn-primary" type="submit">Confirm Deactivation</button>
    </form>
{% endblock %}
